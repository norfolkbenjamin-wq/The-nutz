<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShellShock Live - Aim Tracer Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            background: transparent;
            cursor: crosshair;
            z-index: 10000;
        }

        .overlay-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            z-index: 10001;
            max-width: 350px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 10px;
        }

        .control-row label {
            color: #ffff00;
            min-width: 90px;
            font-weight: bold;
        }

        .control-row input[type="range"] {
            flex: 1;
            min-width: 100px;
            height: 18px;
            cursor: pointer;
        }

        .control-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
        }

        .control-row input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
            border: none;
        }

        .value-display {
            min-width: 60px;
            text-align: right;
            color: #00ff00;
            font-weight: bold;
        }

        .info-grid {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ff00;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: #ffff00;
            font-size: 10px;
        }

        .info-value {
            color: #00ff00;
            font-weight: bold;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 6px 12px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            transition: all 0.2s;
            min-width: 70px;
        }

        button:hover {
            background: #ffff00;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 380px;
            background: #00ff00;
            color: #000;
            border: 2px solid #00ff00;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10001;
            font-size: 12px;
        }

        .toggle-btn:hover {
            background: #ffff00;
        }

        .toggle-btn.collapsed {
            background: #ff6600;
            border-color: #ff6600;
        }

        .overlay-controls.hidden {
            display: none;
        }

        .tank-marker {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 10002;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .tank-marker.player {
            color: #00ff00;
        }

        .tank-marker.enemy {
            color: #ff0000;
        }

        .instructions {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            z-index: 10001;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-width: 300px;
        }

        .instructions h3 {
            color: #ffff00;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .instructions p {
            margin-bottom: 5px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="instructions">
        <h3>🎮 Aim Tracer Overlay</h3>
        <p>📍 Click & drag to set positions</p>
        <p>🟢 Green dot = Your tank</p>
        <p>🔴 Red dot = Enemy tank</p>
        <p>⬇️ Yellow line = Trajectory</p>
        <p>💨 Adjust sliders below</p>
    </div>

    <button class="toggle-btn" id="toggleBtn" onclick="toggleControls()">▼ Hide Controls</button>

    <div class="overlay-controls" id="controls">
        <div class="control-row">
            <label>Wind Speed:</label>
            <input type="range" id="windSlider" min="-50" max="50" value="0">
            <span class="value-display" id="windValue">0</span>
        </div>

        <div class="control-row">
            <label>Wind Dir:</label>
            <input type="range" id="windDirSlider" min="0" max="360" value="0">
            <span class="value-display" id="windDirValue">0°</span>
        </div>

        <div class="control-row">
            <label>Gun Angle:</label>
            <input type="range" id="angleSlider" min="0" max="180" value="45">
            <span class="value-display" id="angleValue">45°</span>
        </div>

        <div class="control-row">
            <label>Velocity:</label>
            <input type="range" id="velocitySlider" min="10" max="100" value="50">
            <span class="value-display" id="velocityValue">50</span>
        </div>

        <div class="control-row">
            <label>Gravity:</label>
            <input type="range" id="gravitySlider" min="5" max="30" value="9.8" step="0.1">
            <span class="value-display" id="gravityValue">9.8</span>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Distance</span>
                <span class="info-value" id="distance">0 m</span>
            </div>
            <div class="info-item">
                <span class="info-label">Flight Time</span>
                <span class="info-value" id="flightTime">0 s</span>
            </div>
            <div class="info-item">
                <span class="info-label">Max Height</span>
                <span class="info-value" id="maxHeight">0 m</span>
            </div>
            <div class="info-item">
                <span class="info-label">Wind Effect</span>
                <span class="info-value" id="windEffect">0 m</span>
            </div>
        </div>

        <div class="button-group">
            <button onclick="resetPositions()">Reset</button>
            <button onclick="toggleOverlay()">Toggle Vis</button>
        </div>
    </div>

    <script src="overlay-physics.js"></script>
</body>
</html>
